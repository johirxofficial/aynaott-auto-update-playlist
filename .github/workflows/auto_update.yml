name: Auto Update M3U and JSON

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Unzip main.py with password
      env:
        ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
      run: |
        sudo apt-get install -y unzip
        unzip -P "$ZIP_PASS" main.py.zip

    - name: Run Script
      env:
        AYNA_AUTH_API: ${{ secrets.AYNA_AUTH_API }}
      run: python main.py

    - name: Cleanup extracted files
      run: rm -f main.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add AynaOTT.m3u AynaOTT.json
        git diff-index --quiet HEAD || git commit -m "Auto Updated List: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
        git push
